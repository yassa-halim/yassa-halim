name: Update README Stats
'on':
  schedule:
    - cron: 0 0 * * * # every day at midnight UTC
  workflow_dispatch: null
jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Generate GitHub Stats
        run: |
          set -e
          curl -f -s --retry 3 --retry-delay 2 "https://github-readme-stats.vercel.app/api?username=yassa-halim&show_icons=true&theme=github_dark&hide_border=true&include_all_commits=true&count_private=true&bg_color=0d1117&title_color=58a6ff&icon_color=1f6feb&text_color=c9d1d9&ring_color=58a6ff" > stats.svg
          curl -f -s --retry 3 --retry-delay 2 "https://github-readme-stats.vercel.app/api/top-langs/?username=yassa-halim&layout=compact&theme=github_dark&hide_border=true&count_private=true&bg_color=0d1117&title_color=58a6ff&text_color=c9d1d9" > top-langs.svg
          curl -f -s --retry 3 --retry-delay 2 "https://github-profile-trophy.vercel.app/?username=yassa-halim&theme=algolia&no-frame=true&no-bg=true&margin-w=10&margin-h=10&column=7" > trophies.svg
      - name: Commit and push changes
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Action"
          git add stats.svg top-langs.svg trophies.svg
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update README stats"
            git push
          fi