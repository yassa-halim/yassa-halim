name: Update README Stats
on:
  schedule:
    - cron: '0 0 * * *' # every day at midnight UTC
  workflow_dispatch:
jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Generate GitHub Stats
        run: |
          curl -s https://github-readme-stats.vercel.app/api?username=yassa-halim&show_icons=true&theme=github_dark > stats.svg
          curl -s https://github-readme-stats.vercel.app/api/top-langs/?username=yassa-halim&layout=compact&theme=github_dark > top-langs.svg
          curl -s https://github-profile-trophy.vercel.app/?username=yassa-halim&theme=algolia > trophies.svg
      - name: Commit and push changes
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Action"
          git add stats.svg top-langs.svg trophies.svg
          git commit -m "Update README stats"
          git push
